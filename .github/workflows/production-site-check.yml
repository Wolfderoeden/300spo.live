name: Static site checks

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      integrate_hotwallet:
        description: Build and integrate the public hotwallet preview artifact
        required: true
        default: false
        type: boolean
      hotwallet_ref:
        description: Branch, tag or commit from Wolfderoeden/hotwallet
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  website:
    name: Validate static package
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Run package checks
        working-directory: site-live
        run: node scripts/check.js

  wallet-preview:
    name: Build wallet preview artifact
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.integrate_hotwallet }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v7
        with:
          path: site

      - name: Check out hotwallet
        uses: actions/checkout@v7
        with:
          repository: Wolfderoeden/hotwallet
          ref: ${{ inputs.hotwallet_ref }}
          path: hotwallet
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Install hotwallet dependencies
        working-directory: hotwallet
        run: pnpm install --frozen-lockfile

      - name: Capture exact hotwallet source commit
        working-directory: hotwallet
        run: echo "WALLET_SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Export hotwallet for /wallet-app
        working-directory: hotwallet
        env:
          EXPO_PUBLIC_CARDANO_NETWORK: preprod
          EXPO_PUBLIC_ENABLE_MAINNET_SIGNING: "false"
          EXPO_PUBLIC_WEB_PREVIEW: "true"
          EXPO_PUBLIC_WEB_BASE_PATH: /wallet-app
        run: pnpm export:web

      - name: Verify portable wallet export
        working-directory: hotwallet
        env:
          EXPO_PUBLIC_WEB_BASE_PATH: /wallet-app
        run: pnpm verify:web-export

      - name: Integrate and validate export
        working-directory: site/site-live
        env:
          WALLET_SOURCE_COMMIT: ${{ env.WALLET_SOURCE_COMMIT }}
        run: |
          node scripts/integrate-wallet-web.mjs ../../hotwallet/dist
          node scripts/check.js

      - name: Package Chrome preview
        working-directory: hotwallet
        env:
          EXPO_PUBLIC_CARDANO_NETWORK: preprod
          EXPO_PUBLIC_ENABLE_MAINNET_SIGNING: "false"
          EXPO_PUBLIC_WEB_PREVIEW: "true"
        run: |
          pnpm export:web
          node extension/package-extension.mjs extension/build/ci-preprod-preview
          cd extension/build/ci-preprod-preview
          mkdir -p ../../../../site/site-live/public/downloads
          zip -qr ../../../../site/site-live/public/downloads/300-wallet-chrome-preprod-preview.zip .

      - name: Revalidate complete preview package
        working-directory: site/site-live
        run: node scripts/check.js

      - name: Upload checked Netlify publish directory
        uses: actions/upload-artifact@v7
        with:
          name: 300spo-public-with-wallet
          path: site/site-live/public
          if-no-files-found: error
          retention-days: 7
